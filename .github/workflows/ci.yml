name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - name: Codegen
        run: bunx turbo run codegen
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run typecheck

  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: streetsidesoftware/cspell-action@v8
        with:
          config: cspell.json
          incremental_files_only: false
          strict: true
          inline: warning
