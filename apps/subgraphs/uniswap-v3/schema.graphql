type Token @entity(immutable: true) {
  id: Bytes!
  symbol: String!
  name: String!
  decimals: Int!
}

type Pool @entity(immutable: true) {
  id: Bytes!
  token0: Token!
  token1: Token!
  feeTier: Int!

  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
}

type Position @entity(immutable: false) {
  id: ID!

  owner: Bytes!
  operator: Bytes!

  pool: Pool


  tickLower: Int!
  tickUpper: Int!
  liquidity: BigInt!

  nonce: BigInt!

  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!

  closed: Boolean!
}
